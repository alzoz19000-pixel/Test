<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم NASR CARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
        .gold-text { color: #d4af37; }
        .gold-bg { background: linear-gradient(135deg, #d4af37, #f9d976); }
        .admin-card { background: #161616; border: 1px solid #222; border-radius: 20px; transition: 0.3s; overflow: hidden; }
        .sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); z-index: 1000; }
        .sidebar.active { transform: translateX(0); }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; color: #888; }
        .nav-link.active { background: #d4af37; color: #000; font-weight: bold; }
        .search-input { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 12px 40px 12px 15px; width: 100%; outline: none; color: white; }
        .glass-header { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #222; }
    </style>
</head>
<body id="adminBody" class="hidden">

    <div id="sidebar" class="sidebar fixed inset-y-0 right-0 w-72 bg-[#0f0f0f] p-6 border-l border-[#222] shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-2">
                <i class="fas fa-crown gold-text text-xl"></i>
                <h2 class="gold-text font-black text-xl italic">NASR CARD</h2>
            </div>
            <i onclick="toggleMenu()" class="fas fa-arrow-right text-gray-500 cursor-pointer p-2 bg-[#1a1a1a] rounded-full"></i>
        </div>
        <nav class="space-y-4">
            <div onclick="showSection('ordersSection')" class="nav-link active" id="btn-orders"><i class="fas fa-shopping-basket"></i> <span>الطلبات المستلمة</span></div>
            <div onclick="showSection('usersSection')" class="nav-link" id="btn-users"><i class="fas fa-users"></i> <span>إدارة المستخدمين</span></div>
            <div class="pt-6 border-t border-[#222]">
                <button onclick="signOutAdmin()" class="text-red-500 flex items-center gap-2 p-3 w-full"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
            </div>
        </nav>
    </div>

    <header class="glass-header p-4 flex justify-between items-center sticky top-0 z-50">
        <i onclick="toggleMenu()" class="fas fa-bars text-2xl gold-text cursor-pointer active:scale-90"></i>
        <h1 class="text-lg font-black italic gold-text">CONTROL PANEL</h1>
        <div class="w-9 h-9 gold-bg rounded-lg flex items-center justify-center text-black font-black shadow-lg">N</div>
    </header>

    <div class="p-4 max-w-4xl mx-auto">
        <div class="w-full h-36 gold-bg rounded-[2rem] flex flex-col items-center justify-center shadow-2xl mb-8 relative overflow-hidden group">
            <h2 class="text-black text-4xl font-black italic z-10 tracking-tighter">NASR CARD</h2>
            <p class="text-black/50 font-bold text-[10px] z-10 tracking-[0.4em] uppercase">The Legend of Cards</p>
            <i class="fas fa-shield-alt absolute -right-6 -bottom-6 text-9xl text-black/5 opacity-20"></i>
        </div>

        <div id="ordersSection" class="section-content">
            <h3 class="font-black mb-6 border-r-4 border-gold-text pr-3 italic">الطلبات الجديدة</h3>
            <div id="ordersList" class="space-y-4">
                <p class="text-center text-gray-600">جاري جلب الطلبات...</p>
            </div>
        </div>

        <div id="usersSection" class="section-content hidden">
            <h3 class="font-black mb-4 border-r-4 border-blue-500 pr-3 italic">إدارة المستخدمين والرصيد</h3>
            <div class="relative mb-6">
                <input type="text" id="userSearch" oninput="searchUsers()" placeholder="ابحث بالاسم أو UID..." class="search-input">
                <i class="fas fa-search absolute right-4 top-4 text-gray-600"></i>
            </div>
            <div id="usersList" class="space-y-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, increment, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // حماية الأدمن
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "admin@nasr.com") {
                document.getElementById('adminBody').classList.remove('hidden');
                loadOrders();
                loadUsers();
            } else {
                window.location.href = "index.html";
            }
        });

        // التبديل بين الأقسام
        window.showSection = (id) => {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-' + id.replace('Section', '')).classList.add('active');
            toggleMenu();
        };

        // تحميل الطلبات
        function loadOrders() {
            onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('ordersList');
                list.innerHTML = snap.empty ? '<p class="text-center text-gray-500">لا توجد طلبات حالياً</p>' : "";
                snap.forEach(d => {
                    const o = d.data();
                    list.innerHTML += `
                        <div class="admin-card p-5 border-l-4 ${o.status === 'completed' ? 'border-green-500' : 'border-gold-text'}">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="font-bold text-sm text-gray-100">${o.userName}</p>
                                    <p class="text-[9px] text-gray-500 uppercase tracking-widest">${o.userId}</p>
                                </div>
                                <span class="bg-black/50 text-[9px] px-3 py-1 rounded-full border border-white/10 uppercase">${o.status}</span>
                            </div>
                            <div class="bg-black/40 p-3 rounded-2xl border border-white/5 space-y-2 mb-4 text-[11px]">
                                <p>💎 الكمية: <span class="gold-text font-bold">${o.amount} كوين</span></p>
                                <p>🆔 المعرف المطلوب: <span class="text-blue-400 font-mono font-bold select-all">${o.targetAppID}</span></p>
                                <p>💰 السعر: <span class="text-green-500 font-bold">${o.price} EGP</span></p>
                            </div>
                            ${o.status === 'pending' ? `
                            <div class="flex gap-2">
                                <button onclick="updateOrder('${d.id}', 'completed')" class="flex-1 bg-green-600 text-black font-black py-2 rounded-xl text-xs active:scale-95 transition">تم الشحن</button>
                                <button onclick="updateOrder('${d.id}', 'cancelled')" class="flex-1 bg-red-600/10 text-red-500 py-2 rounded-xl text-xs">إلغاء</button>
                            </div>` : ''}
                        </div>
                    `;
                });
            });
        }

        // تحميل المستخدمين والبحث
        let allUsers = [];
        async function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                allUsers = [];
                snap.forEach(d => allUsers.push({id: d.id, ...d.data()}));
                displayUsers(allUsers);
            });
        }

        function displayUsers(users) {
            const list = document.getElementById('usersList');
            list.innerHTML = "";
            users.forEach(u => {
                list.innerHTML += `
                    <div class="admin-card p-4">
                        <div class="flex justify-between items-center mb-3">
                            <p class="font-bold text-sm">${u.name}</p>
                            <p class="gold-text font-black text-sm">${u.balance} <span class="text-[8px]">EGP</span></p>
                        </div>
                        <p class="text-[9px] text-gray-600 mb-4 font-mono">${u.uid}</p>
                        <div class="flex gap-2">
                            <button onclick="addBalance('${u.id}')" class="flex-1 bg-[#d4af37]/10 text-gold-text border border-gold-text/20 py-2 rounded-xl text-[10px] font-bold">+ إضافة رصيد</button>
                        </div>
                    </div>
                `;
            });
        }

        window.searchUsers = () => {
            const val = document.getElementById('userSearch').value.toLowerCase();
            const filtered = allUsers.filter(u => u.name.toLowerCase().includes(val) || u.uid.toLowerCase().includes(val));
            displayUsers(filtered);
        };

        window.addBalance = async (id) => {
            const amount = prompt("أدخل المبلغ المراد إضافته:");
            if(amount && !isNaN(amount)) {
                await updateDoc(doc(db, "users", id), { balance: increment(parseInt(amount)) });
                alert("تمت إضافة الرصيد بنجاح ✅");
            }
        };

        window.updateOrder = async (id, status) => {
            if(confirm("تغيير حالة الطلب؟")) {
                await updateDoc(doc(db, "orders", id), { status: status });
            }
        };

        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('active');
        window.signOutAdmin = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>
