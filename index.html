<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASR CARD - دخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; }
        .s-input { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; width: 100%; outline: none; transition: 0.3s; }
        .s-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .btn-sultan { background: #007bff; color: white; font-weight: bold; border-radius: 10px; padding: 12px; width: 100%; transition: 0.3s; }
        .btn-sultan:hover { background: #0056b3; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-600 italic">NASR <span class="text-gray-800">CARD</span></h1>
            <p class="text-gray-400 text-xs mt-2 uppercase tracking-widest">Digital Service Provider</p>
        </div>
        
        <div id="loginForm" class="space-y-4">
            <input id="email" type="email" placeholder="البريد الإلكتروني" class="s-input">
            <input id="pass" type="password" placeholder="كلمة المرور" class="s-input">
            <button onclick="login()" class="btn-sultan">تسجيل الدخول</button>
            <p class="text-center text-sm text-gray-500">جديد هنا؟ <span onclick="toggle()" class="text-blue-600 cursor-pointer font-bold">أنشئ حساب</span></p>
        </div>

        <div id="regForm" class="hidden space-y-4">
            <input id="regName" type="text" placeholder="الاسم بالكامل" class="s-input">
            <input id="regEmail" type="email" placeholder="البريد الإلكتروني" class="s-input">
            <input id="regPass" type="password" placeholder="كلمة المرور" class="s-input">
            <button onclick="register()" class="btn-sultan bg-green-600 hover:bg-green-700">إنشاء الحساب</button>
            <p class="text-center text-sm text-gray-500">لديك حساب؟ <span onclick="toggle()" class="text-blue-600 cursor-pointer font-bold">دخول</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = { /* ضعي الكود هنا */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.toggle = () => {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('regForm').classList.toggle('hidden');
        };

        window.login = async () => {
            try { await signInWithEmailAndPassword(auth, email.value, pass.value); } 
            catch(e) { alert("بيانات الدخول غير صحيحة"); }
        };

        window.register = async () => {
            try {
                const res = await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
                await setDoc(doc(db, "users", res.user.uid), { name: regName.value, balance: 0, email: regEmail.value, role: "user" });
                alert("تم التسجيل!");
            } catch(e) { alert(e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if(user.email === "admin@nasr.com") window.location.href = "admin.html";
                else window.location.href = "dashboard.html";
            }
        });
    </script>
</body>
</html>
