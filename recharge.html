<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شحن الرصيد - NASR CARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; min-height: 100vh; margin: 0; padding: 20px; }
        .gold-text { color: #f9d976; text-shadow: 0 0 10px rgba(249, 217, 118, 0.2); }
        .gold-bg { background: linear-gradient(135deg, #d4af37, #f9d976); }
        
        .payment-card {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .payment-card:active { transform: scale(0.95); }
        .payment-card.active { border-color: #f9d976; box-shadow: 0 0 20px rgba(249, 217, 118, 0.1); }
        
        .vodafone-logo { width: 45px; height: 45px; background: #e60000; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        
        .coming-soon { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .coming-soon::after {
            content: "قريباً";
            position: absolute; top: 10px; left: 10px;
            background: #f9d976; color: black; padding: 2px 10px;
            border-radius: 10px; font-size: 10px; font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <a href="dashboard.html" class="w-10 h-10 bg-[#111] rounded-full flex items-center justify-center text-gray-400">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="text-xl font-black gold-text italic">اختر وسيلة الشحن</h1>
        </div>

        <div onclick="window.location.href='payment-details.html'" class="payment-card active">
            <div class="flex justify-between items-start mb-6">
                <div class="vodafone-logo">
                    <i class="fab fa-vimeo-v text-white text-2xl"></i>
                </div>
                <i class="fas fa-chevron-left text-gray-600"></i>
            </div>
            <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">Payment Method</p>
            <h2 class="text-lg font-black italic mb-4">فودافون كاش - Vodafone Cash</h2>
            <div class="flex justify-between items-end">
                <span class="text-xs text-gray-400 font-mono" id="displayUID">UID: Loading..</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Vodafone_Logo.png" class="w-8 opacity-20">
            </div>
        </div>

        <div class="payment-card coming-soon">
            <div class="flex justify-between items-start mb-6">
                <div class="w-11 h-11 bg-blue-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-credit-card text-white"></i>
                </div>
            </div>
            <h2 class="text-lg font-black italic">البطاقة البنكية / ميزة</h2>
            <p class="text-gray-500 text-[10px]">الدفع المباشر عبر الفيزا</p>
        </div>

        <p class="text-[10px] text-gray-600 text-center mt-10 font-bold uppercase tracking-widest">Nasr Card Secure Payment</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('displayUID').innerText = "ID: " + user.uid;
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
