<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة تحكم NASR CARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
        .gold-text { color: #f9d976; text-shadow: 0 0 10px rgba(249, 217, 118, 0.2); }
        .gold-bg { background: linear-gradient(135deg, #d4af37, #f9d976); }
        .admin-card { background: #161616; border: 1px solid #222; border-radius: 20px; transition: 0.3s; overflow: hidden; }
        .sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); z-index: 1000; }
        .sidebar.active { transform: translateX(0); }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; color: #888; }
        .nav-link.active { background: #f9d976; color: #000; font-weight: bold; }
        .search-input { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 12px 40px 12px 15px; width: 100%; outline: none; color: white; }
        .glass-header { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #222; }
    </style>
</head>
<body id="adminBody" class="hidden">

    <div id="sidebar" class="sidebar fixed inset-y-0 right-0 w-72 bg-[#0f0f0f] p-6 border-l border-[#222] shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-2">
                <i class="fas fa-crown gold-text text-xl"></i>
                <h2 class="gold-text font-black text-xl italic">NASR CARD</h2>
            </div>
            <i onclick="toggleMenu()" class="fas fa-times text-gray-500 cursor-pointer p-2 bg-[#1a1a1a] rounded-full"></i>
        </div>
        <nav class="space-y-4">
            <div onclick="showSection('ordersSection')" class="nav-link active" id="btn-orders"><i class="fas fa-shopping-basket"></i> <span>طلبات الشحن</span></div>
            <div onclick="showSection('depositsSection')" class="nav-link" id="btn-deposits"><i class="fas fa-wallet"></i> <span>إيداعات الكاش</span></div>
            <div onclick="showSection('usersSection')" class="nav-link" id="btn-users"><i class="fas fa-users"></i> <span>إدارة المستخدمين</span></div>
            <div class="pt-6 border-t border-[#222]">
                <button onclick="signOutAdmin()" class="text-red-500 font-bold flex items-center gap-2 p-3 w-full"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
            </div>
        </nav>
    </div>

    <header class="glass-header p-4 flex justify-between items-center sticky top-0 z-50">
        <i onclick="toggleMenu()" class="fas fa-bars text-2xl gold-text cursor-pointer active:scale-90"></i>
        <h1 class="text-lg font-black italic gold-text tracking-tighter uppercase">Admin Panel</h1>
        <div class="w-9 h-9 gold-bg rounded-lg flex items-center justify-center text-black font-black shadow-lg">N</div>
    </header>

    <div class="p-4 max-w-4xl mx-auto">
        <div class="w-full h-32 gold-bg rounded-[2rem] flex flex-col items-center justify-center shadow-2xl mb-8 relative overflow-hidden">
            <h2 class="text-black text-3xl font-black italic z-10 tracking-tighter">لوحة الإدارة العليا</h2>
            <i class="fas fa-user-shield absolute -right-4 -bottom-4 text-8xl text-black/10"></i>
        </div>

        <div id="ordersSection" class="section-content">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="font-black border-r-4 border-[#f9d976] pr-3 italic uppercase">طلبات شحن العملات</h3>
                <span id="orderCount" class="bg-[#1a1a1a] text-[10px] px-3 py-1 rounded-full text-gray-400">0 طلب</span>
            </div>
            <div id="ordersList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="depositsSection" class="section-content hidden">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="font-black border-r-4 border-green-500 pr-3 italic uppercase">إيداعات المحفظة</h3>
            </div>
            <div id="depositsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="usersSection" class="section-content hidden">
            <h3 class="font-black mb-4 border-r-4 border-blue-500 pr-3 italic uppercase">قاعدة البيانات</h3>
            <div class="relative mb-6">
                <input type="text" id="userSearch" oninput="searchUsers()" placeholder="بحث بالاسم أو ID..." class="search-input">
                <i class="fas fa-search absolute left-4 top-4 text-gray-600"></i>
            </div>
            <div id="usersList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- نظام الإشعارات ---
        let isFirstLoad = true;
        const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

        function sendNotify(title, body) {
            if (!isFirstLoad && Notification.permission === "granted") {
                new Notification(title, { body: body, icon: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png' });
                notificationSound.play().catch(e => console.log("Sound error: ", e));
            }
        }

        // طلب الإذن عند فتح الصفحة
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "admin@nasr.com") {
                document.getElementById('adminBody').classList.remove('hidden');
                loadOrders();
                loadDeposits();
                loadUsers();
                // منع إشعارات البيانات القديمة عند التشغيل الأول
                setTimeout(() => { isFirstLoad = false; }, 3000);
            } else {
                window.location.href = "index.html";
            }
        });

        // 1. تحميل طلبات العملات
        function loadOrders() {
            onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('ordersList');
                document.getElementById('orderCount').innerText = snap.size + " طلب";

                // فحص التغييرات للإشعارات
                snap.docChanges().forEach(change => {
                    if (change.type === "added" && change.doc.data().status === 'pending') {
                        sendNotify("طلب شحن جديد! ⚡", `اسم العميل: ${change.doc.data().userName}`);
                    }
                });

                list.innerHTML = "";
                snap.forEach(d => {
                    const o = d.data();
                    if(o.status !== 'pending') return;
                    list.innerHTML += `
                        <div class="admin-card p-5 border-l-4 border-gold-text">
                            <p class="text-[10px] text-gray-500 uppercase font-bold">اسم المستخدم: ${o.userName}</p>
                            <div class="bg-black/50 p-3 rounded-xl my-3">
                                <p class="text-xs text-gray-400">ID فوفو شات المطلوب:</p>
                                <p class="text-xl font-black text-[#f9d976] select-all">${o.targetID || 'غير معروف'}</p>
                                <p class="text-xs text-blue-400 mt-2">الكمية: ${o.amount} كوين</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="handleOrder('${d.id}', 'completed')" class="flex-1 bg-green-600 text-black font-black py-2 rounded-lg text-xs">تم الشحن</button>
                                <button onclick="handleOrder('${d.id}', 'rejected', '${o.userId}', ${o.price})" class="flex-1 border border-red-500 text-red-500 py-2 rounded-lg text-xs">رفض</button>
                            </div>
                        </div>`;
                });
            });
        }

        // 2. تحميل طلبات إيداع الكاش
        function loadDeposits() {
            onSnapshot(query(collection(db, "deposit_requests"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('depositsList');

                // فحص التغييرات للإشعارات
                snap.docChanges().forEach(change => {
                    if (change.type === "added" && change.doc.data().status === 'pending') {
                        sendNotify("إيداع كاش جديد! 💰", `المبلغ: ${change.doc.data().amount} EGP`);
                    }
                });

                list.innerHTML = "";
                snap.forEach(d => {
                    const dep = d.data();
                    if(dep.status !== 'pending') return;
                    list.innerHTML += `
                        <div class="admin-card p-4 border-l-4 border-green-500">
                            <p class="text-xs font-bold text-gray-300 mb-2">طلب إيداع: ${dep.amount} EGP</p>
                            <p class="text-[10px] text-gray-500">من رقم: ${dep.senderNumber}</p>
                            <a href="${dep.proofImage}" target="_blank" class="block my-3">
                                <img src="${dep.proofImage}" class="h-20 w-full object-cover rounded-lg border border-white/10 hover:opacity-80 transition">
                                <p class="text-[9px] text-center text-blue-400 mt-1">اضغط لتكبير الصورة 🔍</p>
                            </a>
                            <div class="flex gap-2">
                                <button onclick="handleDeposit('${d.id}', '${dep.userId}', ${dep.amount}, 'approved')" class="flex-1 bg-green-600 text-black font-black py-2 rounded-lg text-xs italic">قبول</button>
                                <button onclick="handleDeposit('${d.id}', null, 0, 'rejected')" class="flex-1 bg-red-600/20 text-red-500 py-2 rounded-lg text-xs italic">حذف</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.handleDeposit = async (docId, userId, amount, status) => {
            if(!confirm("هل أنت متأكد؟")) return;
            try {
                if(status === 'approved') {
                    await updateDoc(doc(db, "users", userId), { balance: increment(amount) });
                }
                await deleteDoc(doc(db, "deposit_requests", docId));
                alert("تم تحديث المحفظة بنجاح ✅");
            } catch(e) { alert("خطأ!"); }
        };

        window.handleOrder = async (id, status, uId, price) => {
            if(!confirm("تأكيد العملية؟")) return;
            await updateDoc(doc(db, "orders", id), { status });
            if(status === 'rejected') await updateDoc(doc(db, "users", uId), { balance: increment(price) });
            alert("تم ✅");
        };

        let allUsers = [];
        async function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                allUsers = [];
                const list = document.getElementById('usersList');
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    allUsers.push({id: d.id, ...u});
                    list.innerHTML += `
                        <div class="admin-card p-4 flex justify-between items-center">
                            <div><p class="text-sm font-bold">${u.name}</p><p class="text-xs gold-text">${u.balance} EGP</p></div>
                            <button onclick="addBalance('${d.id}', '${u.name}')" class="bg-white/5 p-2 rounded-lg text-[10px]">تعديل</button>
                        </div>`;
                });
            });
        }

        window.addBalance = async (id, name) => {
            const val = prompt("أدخل القيمة (مثال: 50 للزيادة أو -50 للخصم):");
            if(val) await updateDoc(doc(db, "users", id), { balance: increment(Number(val)) });
        };

        window.showSection = (id) => {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('btn-' + id.replace('Section', '')).classList.add('active');
            if(window.innerWidth < 768) toggleMenu();
        };

        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('active');
        window.signOutAdmin = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>
