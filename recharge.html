<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شحن الرصيد - NASR CARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .gold-text { color: #f9d976; text-shadow: 0 0 10px rgba(249, 217, 118, 0.2); }
        .gold-bg { background: linear-gradient(135deg, #d4af37, #f9d976); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 35px; padding: 30px; width: 90%; max-width: 400px; text-align: center; }
        .input-field { width: 100%; background: #111; border: 1px solid #222; border-radius: 18px; padding: 15px; color: white; outline: none; text-align: center; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
        .input-field:focus { border-color: #f9d976; box-shadow: 0 0 15px rgba(249, 217, 118, 0.1); }
    </style>
</head>
<body>

    <div class="glass-card shadow-2xl">
        <div class="mb-6">
            <div class="w-16 h-16 gold-bg rounded-2xl mx-auto flex items-center justify-center text-black shadow-lg mb-4">
                <i class="fab fa-whatsapp text-3xl"></i>
            </div>
            <h1 class="text-xl font-black gold-text italic uppercase tracking-tighter">RECHARGE WALLET</h1>
            <p class="text-gray-500 text-[9px] mt-2 font-bold uppercase tracking-[0.3em]">NASR CARD SYSTEM</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-gray-500 text-[10px] mb-3 font-bold uppercase">أدخل المبلغ المراد شحنه (EGP)</label>
                <input id="amountInput" type="number" placeholder="0.00" class="input-field">
            </div>

            <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                <p class="text-[9px] text-gray-500 mb-1 uppercase font-bold">Your ID / المعرف الخاص بك</p>
                <p id="displayUID" class="text-[10px] font-mono text-gray-300 break-all">جاري التحقق..</p>
            </div>

            <button onclick="sendToWhatsApp()" class="w-full gold-bg text-black font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                <i class="fab fa-whatsapp text-xl"></i>
                تواصل لشحن الرصيد
            </button>
            
            <button onclick="window.location.href='dashboard.html'" class="text-gray-500 text-[10px] font-bold uppercase hover:text-white transition">Back to Home / رجوع</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let userUID = "";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUID = user.uid;
                document.getElementById('displayUID').innerText = userUID;
            } else {
                window.location.href = "index.html";
            }
        });

        window.sendToWhatsApp = () => {
            const amount = document.getElementById('amountInput').value;
            // استبدل الرقم التالي برقمك الحقيقي ليبدأ بـ 20
            const myPhoneNumber = "201055936987"; 

            if (!amount || amount <= 0) {
                return alert("يرجى إدخال مبلغ صحيح");
            }

            const message = `مرحباً نصر كارد، أريد شحن رصيد في محفظتي.%0A%0A🆔 المعرف (UID): ${userUID}%0A💰 المبلغ المطلوب: ${amount} EGP`;
            const whatsappURL = `https://wa.me/${myPhoneNumber}?text=${message}`;
            window.open(whatsappURL, '_blank');
        };
    </script>
</body>
</html>
