<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي - Nasr Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> body { font-family: 'Cairo', sans-serif; background: #f1f5f9; } </style>
</head>
<body>
    <div class="bg-white p-4 shadow-sm flex items-center gap-4 mb-4 sticky top-0 z-50">
        <a href="dashboard.html" class="text-gray-500 text-xl"><i class="fas fa-arrow-right"></i></a>
        <h1 class="text-lg font-bold">سجل الطلبات</h1>
    </div>

    <div id="list" class="p-4 max-w-md mx-auto space-y-4">
        <p class="text-center text-gray-400 py-10 italic">جاري تحميل طلباتك...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = { /* ضعي الكود هنا */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (u) => {
            if(u){
                const q = query(collection(db, "orders"), where("uid", "==", u.uid));
                const snap = await getDocs(q);
                let h = "";
                snap.forEach(d => {
                    const data = d.data();
                    const color = data.status === "مكتمل" ? "text-green-600" : "text-orange-500";
                    h += `<div class="bg-white p-4 rounded-xl shadow-sm border-r-4 border-blue-500">
                        <div class="flex justify-between text-[10px] text-gray-400 mb-2"><span>${data.date}</span><span class="font-bold ${color}">${data.status}</span></div>
                        <p class="text-sm font-bold text-gray-800">شحن ${Number(data.amount).toLocaleString()} كوينز</p>
                        <p class="text-xs text-gray-500 mt-1">ID: ${data.playerID}</p>
                    </div>`;
                });
                list.innerHTML = h || "<p class='text-center py-10'>لا توجد طلبات</p>";
            }
        });
    </script>
</body>
</html>
