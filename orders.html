<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سجل العمليات - Nasr Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; overflow-x: hidden; padding-bottom: 110px; }
        .gold-text { color: #f9d976; text-shadow: 0 0 10px rgba(249, 217, 118, 0.2); }
        .gold-bg { background: linear-gradient(135deg, #d4af37, #f9d976); }
        .nav-blur { background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .order-card { background: linear-gradient(145deg, #161616, #0f0f0f); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 18px; margin-bottom: 15px; position: relative; }
        
        .status-badge { padding: 5px 14px; border-radius: 10px; font-size: 11px; font-weight: 900; }
        .status-pending { background: rgba(249, 217, 118, 0.1); color: #f9d976; border: 1px solid rgba(249, 217, 118, 0.3); }
        .status-completed, .status-approved { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-rejected { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        
        .type-badge { position: absolute; top: -10px; right: 20px; background: #1a1a1a; padding: 2px 12px; border-radius: 8px; font-size: 9px; font-weight: bold; border: 1px solid rgba(255,255,255,0.05); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .home-btn-wrapper { position: relative; top: -20px; }
        .home-btn { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 5px solid #050505; box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4); }
    </style>
</head>
<body>

    <nav class="nav-blur p-4 flex items-center gap-4 sticky top-0 z-50">
        <a href="dashboard.html" class="w-10 h-10 bg-[#1a1a1a] rounded-full flex items-center justify-center text-gray-400">
            <i class="fas fa-arrow-right"></i>
        </a>
        <div>
            <h1 class="text-lg font-black gold-text italic uppercase">سجل العمليات</h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">History & Status</p>
        </div>
    </nav>

    <div id="list" class="p-5 max-w-md mx-auto">
        <div class="text-center py-20 text-gray-600">
            <i class="fas fa-spinner fa-spin text-3xl mb-4 gold-text"></i>
            <p class="font-bold italic">جاري تحميل سجل عملياتك...</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div onclick="window.location.href='deposit-history.html'" class="flex flex-col items-center gap-1 text-gray-500 cursor-pointer">
            <i class="fas fa-file-invoice-dollar text-xl"></i>
            <span class="text-[9px] font-bold">السجل</span>
        </div>
        <div onclick="window.location.href='orders.html'" class="flex flex-col items-center gap-1 text-[#f9d976] cursor-pointer">
            <i class="fas fa-shopping-basket text-xl"></i>
            <span class="text-[9px] font-bold">الطلبات</span>
        </div>
        <div onclick="window.location.href='dashboard.html'" class="home-btn-wrapper cursor-pointer">
            <div class="home-btn gold-bg text-black">
                <i class="fas fa-home text-2xl"></i>
            </div>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-500 opacity-30 cursor-not-allowed">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[9px] font-bold">المحفظة</span>
        </div>
        <div onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-gray-500 cursor-pointer">
            <i class="fas fa-user-gear text-xl"></i>
            <span class="text-[9px] font-bold">حسابي</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (u) => {
            if(!u) { window.location.href = "index.html"; return; }

            try {
                // جلب طلبات الشحن
                const qOrders = query(collection(db, "orders"), where("userId", "==", u.uid));
                const snapOrders = await getDocs(qOrders);

                // جلب طلبات الإيداع
                const qDeposits = query(collection(db, "deposit_requests"), where("userId", "==", u.uid));
                const snapDeposits = await getDocs(qDeposits);

                let allItems = [];

                // معالجة طلبات الشحن
                snapOrders.forEach(d => {
                    allItems.push({ id: d.id, type: 'recharge', ...d.data() });
                });

                // معالجة طلبات الإيداع
                snapDeposits.forEach(d => {
                    allItems.push({ id: d.id, type: 'deposit', ...d.data() });
                });

                // ترتيب من الأحدث (افتراضياً بالوقت)
                allItems.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                if (allItems.length === 0) {
                    document.getElementById('list').innerHTML = `
                        <div class="text-center py-20">
                            <i class="fas fa-receipt text-5xl text-gray-800 mb-4"></i>
                            <p class="text-gray-500 font-bold">لا توجد عمليات سابقة</p>
                        </div>`;
                    return;
                }

                let htmlContent = "";
                allItems.forEach(item => {
                    let statusLabel = "";
                    let statusClass = "";
                    let icon = "";
                    let title = "";
                    let subTitle = "";
                    let detailLabel = "";
                    let detailValue = "";

                    // منطق حالات الطلب (الشحن والإيداع)
                    const status = item.status;
                    if (status === "completed" || status === "approved") {
                        statusLabel = "تم القبول ✅";
                        statusClass = "status-completed";
                    } else if (status === "rejected") {
                        statusLabel = "تم الرفض ❌";
                        statusClass = "status-rejected";
                    } else {
                        statusLabel = "قيد المراجعة ⏳";
                        statusClass = "status-pending";
                    }

                    // تخصيص الشكل بناءً على النوع
                    if (item.type === 'recharge') {
                        icon = '<i class="fas fa-bolt gold-text text-xl"></i>';
                        title = "شحن فوفو شات";
                        subTitle = `${Number(item.amount).toLocaleString()} كوينز`;
                        detailLabel = "ID الحساب";
                        detailValue = item.targetID || "غير متوفر";
                        htmlContent += `<div class="order-card shadow-xl">
                            <div class="type-badge text-blue-400">ORDER</div>`;
                    } else {
                        icon = '<i class="fas fa-wallet text-green-500 text-xl"></i>';
                        title = "إيداع رصيد كاش";
                        subTitle = `${item.amount} EGP`;
                        detailLabel = "رقم المحول";
                        detailValue = item.senderNumber || "----";
                        htmlContent += `<div class="order-card shadow-xl border-green-900/20">
                            <div class="type-badge text-green-500">DEPOSIT</div>`;
                    }

                    const date = item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleDateString('ar-EG') : "جاري المعالجة";

                    htmlContent += `
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] text-gray-600 font-mono">#${item.id.substring(0,6).toUpperCase()}</span>
                            <span class="status-badge ${statusClass}">${statusLabel}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-black/40 rounded-2xl flex items-center justify-center border border-white/5">
                                ${icon}
                            </div>
                            <div>
                                <p class="text-sm font-black text-white italic">${title}</p>
                                <p class="text-xs gold-text font-bold mt-0.5">${subTitle}</p>
                            </div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-white/5 flex justify-between items-center">
                            <div>
                                <p class="text-[9px] text-gray-600 uppercase font-bold">${detailLabel}</p>
                                <p class="text-xs font-bold text-gray-300">${detailValue}</p>
                            </div>
                            <div class="text-left">
                                <p class="text-[9px] text-gray-600 uppercase font-bold">التاريخ</p>
                                <p class="text-xs font-black text-white">${date}</p>
                            </div>
                        </div>
                    </div>`;
                });
                document.getElementById('list').innerHTML = htmlContent;

            } catch (e) {
                console.error(e);
                document.getElementById('list').innerHTML = "<p class='text-center py-10 text-red-500'>خطأ في مزامنة السجلات</p>";
            }
        });
    </script>
</body>
</html>
