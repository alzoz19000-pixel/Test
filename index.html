<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم إلى نصر كارد | NASR CARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #1a0b2e 0%, #05010a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        /* تأثير الخلفية المتحركة */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(249, 217, 118, 0.05);
            filter: blur(100px);
            border-radius: 50%;
            z-index: 0;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #f9d976;
            font-size: 18px;
            transition: 0.3s;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 15px 50px 15px 15px;
            color: #fff;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

        .input-field:focus {
            border-color: #f9d976;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(249, 217, 118, 0.1);
        }

        .btn-glow {
            background: linear-gradient(135deg, #f9d976 0%, #d4af37 100%);
            color: #000;
            font-weight: 900;
            padding: 16px;
            border-radius: 18px;
            width: 100%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-glow:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.5);
        }

        .password-strength {
            display: flex;
            gap: 5px;
            margin-top: -10px;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        .strength-dot {
            height: 4px;
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .logo-box {
            width: 70px;
            height: 70px;
            background: #f9d976;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-5deg);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-card text-center">
        <div class="logo-box">
            <i class="fas fa-crown text-3xl text-black"></i>
        </div>
        <h2 class="text-2xl font-black text-white mb-2 italic">إنشاء حساب ملكي</h2>
        <p class="text-gray-400 text-xs mb-8">ابدأ رحلتك مع NASR CARD الآن</p>

        <form id="registerForm">
            <div class="flex gap-3 mb-4">
                <div class="input-group w-1/2">
                    <i class="fas fa-user-tag text-sm"></i>
                    <input type="text" placeholder="الاسم الأخير" class="input-field" required>
                </div>
                <div class="input-group w-1/2">
                    <i class="fas fa-user text-sm"></i>
                    <input type="text" placeholder="الاسم الأول" class="input-field" required>
                </div>
            </div>

            <div class="input-group">
                <i class="fas fa-at"></i>
                <input type="text" placeholder="اسم المستخدم فريد" class="input-field" required>
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="البريد الإلكتروني" class="input-field" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="كلمة السر القوية" class="input-field" required>
            </div>

            <div class="password-strength">
                <div class="strength-dot bg-yellow-500"></div>
                <div class="strength-dot bg-yellow-500"></div>
                <div class="strength-dot"></div>
                <div class="strength-dot"></div>
            </div>

            <button type="submit" class="btn-glow">تسجيل الحساب</button>
        </form>

        <p class="mt-8 text-sm text-gray-400">
            عندك حساب أصلاً؟ 
            <a href="index.html" class="text-[#f9d976] font-bold underline">سجل دخولك</a>
        </p>
    </div>

</body>
</html>
