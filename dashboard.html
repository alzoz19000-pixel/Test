<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasr Card - لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: white; padding: 1.5rem; }
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; padding: 1.5rem; }
    </style>
</head>
<body class="max-w-md mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 id="uName" class="text-cyan-400 font-bold italic">..</h2>
        <button onclick="logout()" class="text-red-500">خروج</button>
    </div>

    <div class="glass text-center mb-6 border-b-4 border-cyan-500">
        <p class="text-xs text-gray-400 uppercase">رصيدك الحالي</p>
        <h1 class="text-4xl font-black mt-2"><span id="uBalance">0</span> EGP</h1>
    </div>

    <div class="glass mb-6 flex items-center cursor-pointer" onclick="openOrder()">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_K73R8YisT8S-VqYyv-YwR_xP0Xp0VzR5rA&s" class="w-12 h-12 rounded-xl ml-4">
        <div>
            <h3 class="font-bold text-purple-400 text-lg italic">FOFO CHAT</h3>
            <p class="text-[10px] text-gray-400">اشحن كوينز الآن بأفضل سعر</p>
        </div>
    </div>

    <button onclick="window.location.href='https://wa.me/201055936987'" class="w-full bg-green-600 p-4 rounded-2xl font-bold mb-4">شحن المحفظة (واتساب)</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = { /* نفس الكونسفيج بتاعك */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = "index.html";
            else {
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()){
                    document.getElementById('uName').innerText = snap.data().name;
                    document.getElementById('uBalance').innerText = snap.data().balance;
                }
            }
        });

        window.logout = () => signOut(auth);
        window.openOrder = () => alert("سيتم فتح نافذة الطلب.. (يمكنك إضافة كود الـ Modal هنا)");
    </script>
</body>
</html>
