<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasr Card - دخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: white; display: flex; align-items: center; justify-content: center; min-height: screen; }
        .cyber-card { background: rgba(15, 15, 25, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; width: 100%; max-width: 400px; padding: 2rem; }
    </style>
</head>
<body class="p-6">
    <div id="authBox" class="cyber-card">
        <h1 class="text-3xl font-bold text-center text-cyan-400 mb-8 italic">NASR CARD</h1>
        
        <div id="loginForm">
            <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full bg-slate-900 p-4 rounded-xl mb-4 border border-slate-700 outline-none">
            <input id="pass" type="password" placeholder="كلمة المرور" class="w-full bg-slate-900 p-4 rounded-xl mb-6 border border-slate-700 outline-none">
            <button onclick="login()" class="w-full bg-cyan-600 p-4 rounded-xl font-bold shadow-lg shadow-cyan-500/20">دخول</button>
            <p class="text-center mt-4 text-sm text-gray-400">ليس لديك حساب؟ <button onclick="toggleAuth()" class="text-cyan-400">سجل هنا</button></p>
        </div>

        <div id="registerForm" class="hidden">
            <input id="regName" type="text" placeholder="الاسم" class="w-full bg-slate-900 p-4 rounded-xl mb-4 border border-slate-700 outline-none">
            <input id="regEmail" type="email" placeholder="البريد الإلكتروني" class="w-full bg-slate-900 p-4 rounded-xl mb-4 border border-slate-700 outline-none">
            <input id="regPass" type="password" placeholder="كلمة المرور" class="w-full bg-slate-900 p-4 rounded-xl mb-6 border border-slate-700 outline-none">
            <button onclick="register()" class="w-full bg-purple-600 p-4 rounded-xl font-bold">إنشاء حساب</button>
            <p class="text-center mt-4 text-sm text-gray-400">لديك حساب؟ <button onclick="toggleAuth()" class="text-cyan-400">دخول</button></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.toggleAuth = () => {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        };

        window.login = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("بيانات خطأ"); }
        };

        window.register = async () => {
            const n = document.getElementById('regName').value;
            const e = document.getElementById('regEmail').value;
            const p = document.getElementById('regPass').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", res.user.uid), { name: n, balance: 0, email: e, role: "user" });
                alert("تم التسجيل!");
            } catch(err) { alert(err.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if(user.email === "admin@nasr.com") window.location.href = "admin.html";
                else window.location.href = "dashboard.html";
            }
        });
    </script>
</body>
</html>
