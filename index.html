<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasr Card - إنشاء حساب جديد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0d0118; /* اللون الداكن من سكرين شوت سلطان كارد */
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.02);
            padding: 40px 30px;
            border-radius: 35px;
            border: 1px solid rgba(212, 175, 55, 0.05);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-box {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #d4af37, #f9d976);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-5deg);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-field {
            background: #1a1025; /* لون الحقول من الصورة */
            border: 1px solid #2d1b40;
            border-radius: 15px;
            padding: 14px 18px;
            width: 100%;
            color: #fff;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
            text-align: right;
        }

        .input-field:focus {
            border-color: #d4af37;
            background: #231633;
        }

        .btn-register {
            background: linear-gradient(to right, #d4af37, #f9d976);
            color: #000;
            font-weight: 900;
            border: none;
            border-radius: 15px;
            padding: 16px;
            width: 100%;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-register:active { transform: scale(0.97); }

        .requirements {
            font-size: 11px;
            color: #666;
            text-align: right;
            margin: 12px 5px;
            list-style: none;
            padding: 0;
        }

        .requirements li { margin-bottom: 4px; }
        .requirements li::before {
            content: "•";
            color: #d4af37;
            margin-left: 8px;
            font-weight: bold;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 13px;
            color: #888;
        }

        .footer-text a {
            color: #d4af37;
            font-weight: bold;
            text-decoration: none;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo-box">
            <i class="fas fa-crown text-4xl text-black"></i>
        </div>

        <form id="registerForm">
            <div class="input-row">
                <input type="text" id="lastName" placeholder="الاسم الأخير" class="input-field" required>
                <input type="text" id="firstName" placeholder="الاسم الأول" class="input-field" required>
            </div>

            <input type="text" id="username" placeholder="اسم المستخدم" class="input-field mb-4" required>
            
            <input type="password" id="password" placeholder="كلمة السر" class="input-field mb-1" required>
            
            <ul class="requirements">
                <li>يجب أن تحتوي حرف صغير</li>
                <li>يجب أن تحتوي حرف كبير</li>
                <li>يجب أن تحتوي رقم</li>
                <li>يجب أن تحتوي رمز</li>
            </ul>

            <input type="email" id="email" placeholder="البريد الإلكتروني" class="input-field mt-3" required>

            <button type="submit" id="submitBtn" class="btn-register">تسجيل</button>
        </form>

        <div class="footer-text">
            هل لديك حساب؟ 
            <a href="login.html">دخول</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const username = document.getElementById('username').value;

            btn.disabled = true;
            btn.innerText = "جاري إنشاء الحساب...";

            try {
                // 1. إنشاء الحساب في Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. ربط وحفظ البيانات في Firestore Database
                await setDoc(doc(db, "users", user.uid), {
                    name: firstName + " " + lastName,
                    username: username,
                    email: email,
                    balance: 0, // رصيد افتتاحي
                    uid: user.uid,
                    role: "user", // لتحديد أنه ليس أدمن
                    createdAt: new Date()
                });

                alert("تم التسجيل بنجاح يا بطل! 👑");
                window.location.href = "dashboard.html";

            } catch (error) {
                btn.disabled = false;
                btn.innerText = "تسجيل";
                if (error.code === 'auth/email-already-in-use') {
                    alert("هذا البريد مسجل مسبقاً!");
                } else {
                    alert("خطأ: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
