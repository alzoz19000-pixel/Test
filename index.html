<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASR CARD | دخول - تسجيل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: radial-gradient(circle at top, #1a0b2e 0%, #05010a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; padding: 40px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .input-field { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 12px 15px; color: white; outline: none; transition: 0.3s; margin-bottom: 15px; text-align: right; }
        .input-field:focus { border-color: #f9d976; box-shadow: 0 0 10px rgba(249, 217, 118, 0.2); }
        .btn-gold { background: linear-gradient(135deg, #f9d976, #d4af37); color: black; font-weight: 900; padding: 14px; border-radius: 15px; width: 100%; border: none; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
        .hidden { display: none; }
        .gold-text { color: #f9d976; cursor: pointer; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="glass-card text-center">
        <div class="mb-6">
            <i class="fas fa-crown text-5xl text-[#f9d976] mb-2"></i>
            <h1 class="text-2xl font-black italic gold-text tracking-tighter" style="text-decoration: none;">NASR CARD</h1>
        </div>

        <div id="loginBox">
            <h2 class="mb-6 text-gray-400">تسجيل الدخول</h2>
            <form id="loginForm">
                <input type="email" id="lEmail" placeholder="البريد الإلكتروني" class="input-field" required>
                <input type="password" id="lPass" placeholder="كلمة السر" class="input-field" required>
                <button type="submit" class="btn-gold">دخول</button>
            </form>
            <p class="mt-6 text-sm text-gray-400">ليس لديك حساب؟ <span class="gold-text" onclick="toggleAuth()">إنشاء حساب جديد</span></p>
        </div>

        <div id="registerBox" class="hidden">
            <h2 class="mb-6 text-gray-400">إنشاء حساب ملكي</h2>
            <form id="registerForm">
                <div class="flex gap-2">
                    <input type="text" id="rFirst" placeholder="الاسم الأول" class="input-field" required>
                    <input type="text" id="rLast" placeholder="الأخير" class="input-field" required>
                </div>
                <input type="text" id="rUser" placeholder="اسم المستخدم" class="input-field" required>
                <input type="email" id="rEmail" placeholder="البريد الإلكتروني" class="input-field" required>
                <input type="password" id="rPass" placeholder="كلمة السر" class="input-field" required>
                <button type="submit" class="btn-gold">إنشاء الحساب</button>
            </form>
            <p class="mt-6 text-sm text-gray-400">لديك حساب بالفعل؟ <span class="gold-text" onclick="toggleAuth()">سجل دخولك</span></p>
        </div>

        <div class="my-6 border-t border-white/5 pt-6">
            <button id="googleBtn" class="w-full bg-white text-black font-bold py-3 rounded-15 flex items-center justify-center gap-2 hover:bg-gray-200 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
                الدخول بواسطة Google
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // تبديل الواجهة
        window.toggleAuth = () => {
            document.getElementById('loginBox').classList.toggle('hidden');
            document.getElementById('registerBox').classList.toggle('hidden');
        };

        // حفظ بيانات المستخدم الجديد في الداتابيز
        async function saveUser(user, name) {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                await setDoc(ref, { name: name, email: user.email, balance: 0, uid: user.uid });
            }
        }

        // دخول
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, lEmail.value, lPass.value);
                window.location.href = "dashboard.html";
            } catch (err) { alert("خطأ في البيانات!"); }
        };

        // تسجيل جديد
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const res = await createUserWithEmailAndPassword(auth, rEmail.value, rPass.value);
                await saveUser(res.user, `${rFirst.value} ${rLast.value}`);
                window.location.href = "dashboard.html";
            } catch (err) { alert("حدث خطأ في التسجيل: " + err.message); }
        };

        // حل مشكلة جوجل
        document.getElementById('googleBtn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                // نستخدم Popup، تأكد من تفعيل الدومين في Firebase Console
                const res = await signInWithPopup(auth, provider);
                await saveUser(res.user, res.user.displayName);
                window.location.href = "dashboard.html";
            } catch (err) {
                console.error(err);
                alert("جوجل رفض الاتصال. تأكد من إضافة رابط الموقع في Authorized Domains داخل Firebase.");
            }
        };
    </script>
</body>
</html>
