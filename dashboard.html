<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nasr Card - الرئيسية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; overflow-x: hidden; padding-bottom: 110px; }
        .gold-text { color: #f9d976; text-shadow: 0 0 10px rgba(249, 217, 118, 0.3); }
        .gold-bg { background: linear-gradient(135deg, #d4af37, #f9d976); }
        .dark-card { background: linear-gradient(145deg, #161616, #0f0f0f); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; transition: 0.3s; overflow: hidden; }
        .nav-blur { background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* شريط التنقل السفلي الاحترافي */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .home-btn-wrapper { position: relative; top: -20px; }
        .home-btn { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 5px solid #050505; box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4); }
        
        .modal-animate { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .info-row { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <nav class="nav-blur p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 gold-bg rounded-xl flex items-center justify-center text-black shadow-lg">
                <i class="fas fa-crown text-sm"></i>
            </div>
            <h1 class="text-lg font-black gold-text italic tracking-tighter uppercase">NASR CARD</h1>
        </div>
        <button onclick="signOutUser()" class="w-9 h-9 bg-[#1a1a1a] rounded-full text-gray-400 active:scale-90 transition-transform">
            <i class="fas fa-power-off text-xs"></i>
        </button>
    </nav>

    <div class="p-5 max-w-md mx-auto">
        
        <div class="relative w-full rounded-[2.5rem] overflow-hidden mb-8 border border-white/5 shadow-2xl">
            <img src="bnar.png" class="w-full h-44 object-cover" onerror="this.src='https://img.freepik.com/free-vector/ramadan-kareem-banner-with-lanterns_1017-31181.jpg';">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex items-end p-6">
                <p class="text-white font-black text-xl italic leading-tight">مرحباً بك في<br><span class="gold-text">ملك الشحن</span></p>
            </div>
        </div>

        <div class="dark-card p-6 mb-10 border-r-4 border-r-[#f9d976] shadow-xl">
            <div class="flex items-center gap-4">
                <div id="userInitial" class="w-14 h-14 gold-bg rounded-2xl flex items-center justify-center text-black font-black text-2xl shadow-inner">U</div>
                <div>
                    <p id="uNameDisplay" class="font-black text-lg text-white italic">جاري التحميل..</p>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="bg-[#222] text-[10px] px-2 py-0.5 rounded-full text-gray-400 font-bold uppercase">Balance</span>
                        <p class="gold-text font-black text-lg"><span id="uBalance">0</span> <span class="text-[10px]">EGP</span></p>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="text-gray-500 font-black text-xs uppercase tracking-widest mb-4 px-2">الخدمات المتوفرة</h2>
        <div class="grid grid-cols-1 gap-6">
            <div onclick="openChatModal()" class="dark-card cursor-pointer group hover:border-[#f9d976]/30 transition-all active:scale-[0.98]">
                <div class="relative h-48">
                    <img src="fofo.png" class="w-full h-full object-cover" onerror="this.src='https://i.ibb.co/Chat-Section.png';">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-transparent"></div>
                    <div class="absolute bottom-5 right-6 text-right">
                        <p class="text-white font-black text-2xl italic tracking-tighter">فوفو شات</p>
                        <p class="text-[#f9d976] text-[10px] font-bold uppercase">Instant Delivery ⚡</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div onclick="window.location.href='orders.html'" class="flex flex-col items-center gap-1 text-gray-500 cursor-pointer">
            <i class="fas fa-history text-xl"></i>
            <span class="text-[9px] font-bold">السجل</span>
        </div>

        <div onclick="window.location.href='orders.html'" class="flex flex-col items-center gap-1 text-[#f9d976] cursor-pointer">
            <i class="fas fa-shopping-basket text-2xl"></i>
            <span class="text-[9px] font-bold">الطلبات</span>
        </div>

        <div onclick="window.location.href='dashboard.html'" class="home-btn-wrapper cursor-pointer">
            <div class="home-btn gold-bg text-black">
                <i class="fas fa-home text-2xl"></i>
            </div>
        </div>

        <div class="flex flex-col items-center gap-1 text-gray-500 opacity-30">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[9px] font-bold">المحفظة</span>
        </div>

        <div onclick="openSettingsModal()" class="flex flex-col items-center gap-1 text-gray-500 cursor-pointer">
            <i class="fas fa-user-gear text-xl"></i>
            <span class="text-[9px] font-bold">حسابي</span>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/98 z-[110] hidden flex items-center justify-center p-6">
        <div class="bg-[#111] w-full max-w-sm rounded-[2.5rem] p-8 border border-white/10 modal-animate text-center shadow-2xl">
            <div class="w-20 h-20 gold-bg rounded-3xl mx-auto mb-6 flex items-center justify-center text-black font-black text-3xl shadow-lg rotate-3" id="modalInitial">U</div>
            <h3 class="gold-text font-black text-xl mb-8 italic uppercase tracking-tighter">My Account</h3>
            
            <div class="space-y-3 text-right">
                <div class="info-row"><span class="text-gray-500 text-[10px] font-bold">NAME</span><span id="set_name" class="text-white font-bold text-sm italic">-</span></div>
                <div class="info-row"><span class="text-gray-500 text-[10px] font-bold">EMAIL</span><span id="set_email" class="text-white font-bold text-xs">-</span></div>
                <div class="info-row"><span class="text-gray-500 text-[10px] font-bold">BALANCE</span><span id="set_balance" class="gold-text font-black text-sm">- EGP</span></div>
                <div class="info-row"><span class="text-gray-500 text-[10px] font-bold">USER ID</span><span id="set_id" class="text-gray-400 font-mono text-[9px]">-</span></div>
            </div>

            <button onclick="closeSettingsModal()" class="w-full bg-[#222] text-white font-black py-4 rounded-2xl mt-8 active:scale-95 transition-all">إغلاق</button>
        </div>
    </div>

    <div id="chatModal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-end justify-center">
        <div class="bg-[#111] w-full rounded-t-[3rem] p-8 modal-animate border-t border-white/10 shadow-2xl">
            <div class="w-10 h-1.5 bg-[#333] rounded-full mx-auto mb-8"></div>
            <h3 class="gold-text font-black text-2xl mb-8 italic text-right">طلب شحن فوفو شات</h3>
            <input id="targetID" type="text" placeholder="أدخل ID حساب فوفو" class="w-full bg-[#1a1a1a] p-5 rounded-2xl border border-white/5 mb-5 text-center text-white text-lg">
            <input id="coinInput" type="number" oninput="calculate()" placeholder="الكمية (الحد الأدنى 100,000)" class="w-full bg-[#1a1a1a] p-5 rounded-2xl border border-white/5 mb-5 text-center text-white text-lg">
            <div class="flex justify-between items-center px-6 py-4 bg-black/40 rounded-2xl mb-8">
                <span class="text-gray-500 font-bold italic">الإجمالي:</span>
                <span class="gold-text font-black text-3xl"><span id="finalPrice">0</span> <span class="text-[10px]">EGP</span></span>
            </div>
            <button id="orderBtn" onclick="sendOrder()" class="w-full gold-bg text-black font-black py-5 rounded-2xl text-xl shadow-lg active:scale-95 transition-all">تأكيد الطلب</button>
            <button onclick="closeChatModal()" class="w-full text-gray-500 font-bold mt-6 hover:text-white">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // تحميل البيانات
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                try {
                    const snap = await getDoc(doc(db, "users", user.uid));
                    if (snap.exists()) {
                        const data = snap.data();
                        const name = data.name || "مستخدم نصر";
                        const bal = data.balance || 0;
                        document.getElementById('uNameDisplay').innerText = name;
                        document.getElementById('uBalance').innerText = bal;
                        document.getElementById('userInitial').innerText = name.charAt(0).toUpperCase();
                        
                        document.getElementById('set_name').innerText = name;
                        document.getElementById('set_email').innerText = user.email;
                        document.getElementById('set_balance').innerText = bal + " EGP";
                        document.getElementById('set_id').innerText = user.uid;
                        document.getElementById('modalInitial').innerText = name.charAt(0).toUpperCase();
                    }
                } catch (e) { console.error("Error fetching user data:", e); }
            }
        });

        window.calculate = () => {
            const v = document.getElementById('coinInput').value;
            document.getElementById('finalPrice').innerText = v >= 100000 ? Math.round((v / 100000) * 50) : 0;
        };

        window.openSettingsModal = () => document.getElementById('settingsModal').classList.remove('hidden');
        window.closeSettingsModal = () => document.getElementById('settingsModal').classList.add('hidden');
        window.openChatModal = () => document.getElementById('chatModal').classList.remove('hidden');
        window.closeChatModal = () => document.getElementById('chatModal').classList.add('hidden');

        // إرسال الطلب لـ Firebase بنجاح
        window.sendOrder = async () => {
            const id = targetID.value.trim();
            const amt = coinInput.value;
            const price = finalPrice.innerText;
            if(!id || amt < 100000) return alert("يرجى إدخال ID صحيح والحد الأدنى 100,000 كوين");

            const btn = document.getElementById('orderBtn');
            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";

            try {
                await addDoc(collection(db, "orders"), {
                    userId: auth.currentUser.uid,
                    userName: document.getElementById('uNameDisplay').innerText,
                    targetID: id,
                    amount: amt,
                    price: price,
                    status: "pending",
                    timestamp: serverTimestamp()
                });
                alert("تم إرسال طلبك بنجاح ✅ راقب صفحة الطلبات لمعرفة النتيجة.");
                closeChatModal();
                targetID.value = "";
                coinInput.value = "";
                finalPrice.innerText = "0";
            } catch (e) { alert("خطأ في الاتصال بالسيرفر!"); }
            finally {
                btn.disabled = false;
                btn.innerText = "تأكيد الطلب";
            }
        };

        window.signOutUser = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>
