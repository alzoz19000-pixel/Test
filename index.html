<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASR CARD | دخول - تسجيل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: radial-gradient(circle at top, #1a0b2e 0%, #05010a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; padding: 40px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .input-field { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 12px 15px; color: white; outline: none; transition: 0.3s; margin-bottom: 15px; text-align: right; }
        .input-field:focus { border-color: #f9d976; box-shadow: 0 0 10px rgba(249, 217, 118, 0.2); }
        .btn-gold { background: linear-gradient(135deg, #f9d976, #d4af37); color: black; font-weight: 900; padding: 14px; border-radius: 15px; width: 100%; border: none; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
        .hidden { display: none; }
        .gold-text { color: #f9d976; cursor: pointer; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="glass-card text-center">
        <div class="mb-6">
            <i class="fas fa-crown text-5xl text-[#f9d976] mb-2"></i>
            <h1 class="text-2xl font-black italic gold-text tracking-tighter" style="text-decoration: none;">NASR CARD</h1>
        </div>

        <div id="loginBox">
            <h2 class="mb-6 text-gray-400 font-bold uppercase tracking-widest text-[10px]">Login to your account</h2>
            <form id="loginForm">
                <input type="email" id="lEmail" placeholder="البريد الإلكتروني" class="input-field" required>
                <input type="password" id="lPass" placeholder="كلمة السر" class="input-field" required>
                <button type="submit" id="loginBtn" class="btn-gold">تسجيل الدخول</button>
            </form>
            <p class="mt-6 text-xs text-gray-500">ليس لديك حساب؟ <span class="gold-text" onclick="toggleAuth()">إنشاء حساب جديد</span></p>
        </div>

        <div id="registerBox" class="hidden">
            <h2 class="mb-6 text-gray-400 font-bold uppercase tracking-widest text-[10px]">Create Royal Account</h2>
            <form id="registerForm">
                <div class="flex gap-2">
                    <input type="text" id="rFirst" placeholder="الاسم الأول" class="input-field" required>
                    <input type="text" id="rLast" placeholder="الأخير" class="input-field" required>
                </div>
                <input type="email" id="rEmail" placeholder="البريد الإلكتروني" class="input-field" required>
                <input type="password" id="rPass" placeholder="كلمة السر" class="input-field" required>
                <button type="submit" id="registerBtn" class="btn-gold">إنشاء الحساب</button>
            </form>
            <p class="mt-6 text-xs text-gray-500">لديك حساب بالفعل؟ <span class="gold-text" onclick="toggleAuth()">سجل دخولك</span></p>
        </div>

        <div class="my-6 border-t border-white/5 pt-6">
            <button id="googleBtn" class="w-full bg-white text-black font-bold py-3 rounded-[15px] flex items-center justify-center gap-2 hover:bg-gray-200 transition text-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="16">
                الدخول بواسطة Google
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzsg4K2-AFKQwtlGbr--EszuUzQRQeYD8",
            authDomain: "foforecharge.firebaseapp.com",
            projectId: "foforecharge",
            storageBucket: "foforecharge.firebasestorage.app",
            messagingSenderId: "23143293034",
            appId: "1:23143293034:web:2a5e4e1914a7a8c6776a13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "admin@nasr.com";

        // دالة التوجيه الذكية
        const smartRedirect = (user) => {
            if (user.email === ADMIN_EMAIL) {
                window.location.href = "admin.html";
            } else {
                window.location.href = "dashboard.html";
            }
        };

        // فحص الحالة عند فتح الصفحة
        onAuthStateChanged(auth, (user) => {
            if (user) {
                smartRedirect(user);
            }
        });

        window.toggleAuth = () => {
            document.getElementById('loginBox').classList.toggle('hidden');
            document.getElementById('registerBox').classList.toggle('hidden');
        };

        // --- دالة حفظ المستخدم المحسنة ---
        async function saveUser(user, name) {
            const ref = doc(db, "users", user.uid);
            const snap = await getDoc(ref);
            
            // إذا كان المستخدم لا يملك وثيقة في Firestore، ننشئ واحدة فوراً
            if (!snap.exists()) {
                await setDoc(ref, { 
                    name: name || "مستخدم جديد", 
                    email: user.email, 
                    balance: 0, 
                    uid: user.uid,
                    createdAt: new Date().toISOString()
                });
                console.log("تم إنشاء مستخدم جديد في Firestore ✅");
            }
        }

        // تسجيل الدخول بالبريد
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerText = "جاري التحقق...";
            btn.disabled = true;

            try {
                const res = await signInWithEmailAndPassword(auth, lEmail.value, lPass.value);
                // في تسجيل الدخول العادي، نتأكد أيضاً من وجوده في Firestore (للاحتياط)
                await saveUser(res.user, null); 
                smartRedirect(res.user);
            } catch (err) { 
                alert("بيانات الدخول غير صحيحة!"); 
                btn.innerText = "دخول";
                btn.disabled = false;
            }
        };

        // إنشاء حساب جديد بالبريد
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.innerText = "جاري الإنشاء...";
            btn.disabled = true;

            try {
                const res = await createUserWithEmailAndPassword(auth, rEmail.value, rPass.value);
                // حفظ الاسم الكامل المكون من حقلين
                const fullName = `${document.getElementById('rFirst').value} ${document.getElementById('rLast').value}`;
                await saveUser(res.user, fullName);
                smartRedirect(res.user);
            } catch (err) { 
                alert("خطأ: " + err.message); 
                btn.innerText = "إنشاء الحساب";
                btn.disabled = false;
            }
        };

        // الدخول بجوجل (المعدلة لحل مشكلتك)
        document.getElementById('googleBtn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const res = await signInWithPopup(auth, provider);
                // نمرر الاسم القادم من حساب جوجل لضمان حفظه
                await saveUser(res.user, res.user.displayName);
                smartRedirect(res.user);
            } catch (err) {
                console.error(err);
                alert("فشل الاتصال بجوجل أو تم إلغاء العملية.");
            }
        };
    </script>
</body>
</html>
